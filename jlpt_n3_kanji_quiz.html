* { box-sizing: border-box; margin: 0; padding: 0; }

.mode-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.mode-btn { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }

.mode-btn:hover:not(.active) { background: var(--color-background-secondary); }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem 1.5rem; text-align: center; margin-bottom: 1.25rem; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.kanji-big { font-size: 72px; line-height: 1; color: var(--color-text-primary); font-weight: 400; }
.hari-badge { font-size: 11px; color: var(--color-text-tertiary); background: var(--color-background-tertiary); padding: 3px 10px; border-radius: 12px; }
.hint { font-size: 14px; color: var(--color-text-secondary); font-style: italic; }
.word-display { font-size: 22px; color: var(--color-text-primary); font-weight: 500; }
.reading { font-size: 15px; color: var(--color-text-secondary); }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.opt { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px 12px; font-size: 15px; cursor: pointer; transition: all 0.15s; color: var(--color-text-primary); text-align: center; min-height: 60px; display: flex; align-items: center; justify-content: center; }
.opt:hover:not(.disabled) { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.opt.correct { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.opt.wrong { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
.opt.disabled { cursor: default; }
.feedback { padding: 12px 16px; border-radius: var(--border-radius-md); font-size: 14px; margin-bottom: 1.25rem; display: none; }
.feedback.show { display: block; }
.feedback.ok { background: var(--color-background-success); color: var(--color-text-success); }
.feedback.bad { background: var(--color-background-danger); color: var(--color-text-danger); }
.next-btn { width: 100%; padding: 13px; font-size: 15px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; cursor: pointer; color: var(--color-text-primary); transition: all 0.15s; display: none; }

.next-btn:hover { background: var(--color-background-secondary); }
.result-box { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem; text-align: center; display: none; }

<div class="quiz-wrap">
  <h2 class="sr-only">Kuis Kanji JLPT N3 interaktif</h2>
  <div class="header">

  <div id="quiz-area">

    <div class="result-score" id="result-score">0/20</div>
    <div class="result-label" id="result-label"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem">
      <button class="restart-btn" id="restart-btn">Ulangi kuis ini</button>
      <button class="restart-btn" id="ask-weak">Lihat yang salah ↗</button>
    </div>
  </div>
</div>

let mode = "kanji-to-meaning";
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let wrongList = [];
let filteredKanji = [...ALL_KANJI];
let totalQ = 20;

const hariFilter = document.getElementById("hari-filter");
const countFilter = document.getElementById("count-filter");

const haris = [...new Set(ALL_KANJI.map(k => k.hari))].sort((a,b)=>a-b);
haris.forEach(h => {
  const o = document.createElement("option");
  o.value = h; o.textContent = `Hari ${h}`; hariFilter.appendChild(o);
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDistractors(correct, pool, count, field) {
  const others = pool.filter(k => k[field] !== correct[field]);
  return shuffle(others).slice(0, count).map(k => k[field]);
}

function buildQuestions() {
  const pool = filteredKanji.length >= 4 ? filteredKanji : ALL_KANJI;
  const selected = shuffle(pool).slice(0, totalQ);
  questions = selected.map(item => {
    let q = {item, mode};
    if (mode === "kanji-to-meaning") {
      q.question = item.k;
      q.answer = item.m;
      q.options = shuffle([item.m, ...getDistractors(item, pool, 3, "m")]);
      q.hint = "";
    } else if (mode === "meaning-to-kanji") {
      q.question = item.m;
      q.answer = item.k;
      q.options = shuffle([item.k, ...getDistractors(item, pool, 3, "k")]);
      q.hint = "";
    } else if (mode === "reading") {
      q.question = item.k;
      q.answer = item.r;
      q.options = shuffle([item.r, ...getDistractors(item, pool, 3, "r")]);
      q.hint = "";
    } else {
      q.question = item.k;
      q.answer = item.ex;
      q.options = shuffle([item.ex, ...getDistractors(item, pool, 3, "ex")]);
      q.hint = item.m;
    }
    return q;
  });
  current = 0; correct = 0; wrong = 0; wrongList = [];
  answered = false;
}

function render() {
  const q = questions[current];
  document.getElementById("q-num").textContent = current + 1;
  document.getElementById("q-total").textContent = questions.length;
  document.getElementById("correct-count").textContent = correct;
  document.getElementById("wrong-count").textContent = wrong;
  document.getElementById("progress").style.width = ((current / questions.length) * 100) + "%";

  const card = document.getElementById("question-card");
  card.innerHTML = "";

  const badge = document.createElement("div");
  badge.className = "hari-badge";
  badge.textContent = `Hari ${q.item.hari}`;
  card.appendChild(badge);

  const mainEl = document.createElement("div");
  if (mode === "kanji-to-meaning" || mode === "reading" || mode === "example") {
    mainEl.className = "kanji-big";
    mainEl.textContent = q.question;
  } else {
    mainEl.className = "word-display";
    mainEl.textContent = q.question;
  }
  card.appendChild(mainEl);

  if (q.hint) {
    const h = document.createElement("div");
    h.className = "hint";
    h.textContent = "Arti: " + q.hint;
    card.appendChild(h);
  }
  if (mode === "reading") {
    const sub = document.createElement("div");
    sub.className = "hint";
    sub.textContent = "Bagaimana cara bacanya?";
    card.appendChild(sub);
  }
  if (mode === "example") {
    const sub = document.createElement("div");
    sub.className = "hint";
    sub.textContent = "Pilih contoh kata yang benar";
    card.appendChild(sub);
  }

  const grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = opt;
    btn.onclick = () => choose(btn, opt, q);
    grid.appendChild(btn);
  });

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").className = "next-btn";
  document.getElementById("result-box").className = "result-box";
  document.getElementById("quiz-area").style.display = "block";
  answered = false;
}

function choose(btn, val, q) {
  if (answered) return;
  answered = true;
  const isCorrect = val === q.answer;
  if (isCorrect) {
    correct++;
    btn.classList.add("correct");
    document.getElementById("correct-count").textContent = correct;
  } else {
    wrong++;
    btn.classList.add("wrong");
    wrongList.push(q.item);
    document.getElementById("wrong-count").textContent = wrong;
    document.querySelectorAll(".opt").forEach(b => {
      if (b.textContent === q.answer) b.classList.add("correct");
    });
  }
  document.querySelectorAll(".opt").forEach(b => b.classList.add("disabled"));

  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (isCorrect ? "ok" : "bad");
  if (isCorrect) {
    fb.textContent = "✓ Benar! " + q.item.k + " (" + q.item.r + ") = " + q.item.m;
  } else {
    fb.textContent = "✗ Jawaban: " + q.answer + " | " + q.item.k + " = " + q.item.m + " [" + q.item.r + "]";
  }

  document.getElementById("next-btn").className = "next-btn show";
}

document.getElementById("next-btn").onclick = () => {
  current++;
  if (current >= questions.length) showResult();
  else render();
};

function showResult() {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-box").className = "result-box show";
  document.getElementById("result-score").textContent = correct + "/" + questions.length;
  document.getElementById("progress").style.width = "100%";
  const pct = Math.round((correct / questions.length) * 100);
  const labels = ["Tetap semangat! 💪", "Lumayan, terus berlatih!", "Bagus sekali! 🌸", "Luar biasa! ほぼ完璧！✨"];
  document.getElementById("result-label").textContent = pct < 50 ? labels[0] : pct < 70 ? labels[1] : pct < 90 ? labels[2] : labels[3];
  document.getElementById("ask-weak").onclick = () => {
    const wl = wrongList.map(w => w.k + " (" + w.m + ")").join(", ");
    sendPrompt("Tolong jelaskan lebih detail kanji-kanji ini yang aku salah: " + wl);
  };
}

document.getElementById("restart-btn").onclick = () => {
  buildQuestions(); render();
};
document.getElementById("restart-top").onclick = () => {
  const h = hariFilter.value;
  totalQ = parseInt(countFilter.value);
  filteredKanji = h === "all" ? [...ALL_KANJI] : ALL_KANJI.filter(k => k.hari == h);
  buildQuestions(); render();
};
hariFilter.onchange = () => {
  const h = hariFilter.value;
  filteredKanji = h === "all" ? [...ALL_KANJI] : ALL_KANJI.filter(k => k.hari == h);
};
countFilter.onchange = () => { totalQ = parseInt(countFilter.value); };

document.querySelectorAll(".mode-btn[data-mode]").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".mode-btn[data-mode]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    buildQuestions(); render();
  };
});

buildQuestions();
render();
</script>
